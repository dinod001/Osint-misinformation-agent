<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WARWATCH — OSINT Misinformation Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #060608;
      --panel:     #12141a;
      --accent:    #d32f2f;
      --accent-hi: #ff5252;
      --accent-glow: rgba(255, 82, 82, 0.4);
      --border:    rgba(255, 255, 255, 0.08);
      --text:      #ffffff;
      --text-dim:  #8e9297;
      --amber:     #ffc107;
      --blue:      #00b0ff;
      --confirmed: #00e676;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      background-image:
        linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.45) 100%),
        url('/static/bg.png');
      background-size: cover;
      background-position: center 30%;
      background-attachment: fixed;
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* Scanlines */
    body::before {
      content:''; position:fixed; inset:0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
      pointer-events:none; z-index:1;
    }

    /* Deep vignette */
    body::after {
      content:''; position:fixed; inset:0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.7) 100%);
      pointer-events:none; z-index:1;
    }

    .wrapper {
      position:relative; z-index:2;
      max-width:980px; margin:0 auto;
      padding:44px 32px 80px;
    }

    /* ─── Header ─────────────────────────────── */
    header { text-align:center; margin-bottom:40px; }

    .logo-row {
      display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:10px;
    }

    .skull-icon {
      width:56px; height:56px;
      border:2px solid var(--accent);
      border-radius:4px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.9rem; line-height:1;
      box-shadow: 0 0 18px rgba(204,26,26,0.35);
      animation: flicker 3s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100%  { box-shadow:0 0 14px rgba(204,26,26,0.35); }
      45%      { box-shadow:0 0 6px  rgba(204,26,26,0.15); }
      50%      { box-shadow:0 0 26px rgba(204,26,26,0.55); }
      55%      { box-shadow:0 0 10px rgba(204,26,26,0.25); }
    }

    h1 {
      font-family:'Orbitron', monospace;
      font-size:3.6rem; font-weight:900; letter-spacing:12px;
      color: var(--accent-hi);
      text-shadow: 0 0 25px rgba(255, 50, 50, 0.45);
      text-transform:uppercase; margin: 0;
    }

    .tagline {
      font-family:'Share Tech Mono', monospace;
      font-size:.72rem; letter-spacing:4px;
      color: var(--text-dim);
      text-transform:uppercase; margin-top:4px;
    }

    .status-row {
      display:flex; justify-content:center; align-items:center;
      gap:25px; margin-top:20px;
      font-family:'Share Tech Mono', monospace; font-size:.65rem; color:#4ec952;
    }

    .status-item { display:flex; align-items:center; gap:8px; }
    .status-dot {
      width:7px; height:7px; border-radius:50%;
      background:#4ec952; box-shadow:0 0 8px #4ec952;
      animation:pulse 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ─── Tactical Panel ──────────────────────── */
    .panel {
      position: relative;
      background: linear-gradient(135deg, #181b21 0%, #0d0f12 100%);
      border: 1px solid rgba(255,255,255,0.05);
      border-top: 1px solid rgba(130,160,200,0.25);
      border-radius: 4px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 
        0 15px 40px rgba(0,0,0,0.6),
        inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    /* Brushed metal texture overlay */
    .panel::before {
      content: ""; position: absolute; inset: 0;
      background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
    }

    .section-label {
      font-family:'Share Tech Mono', monospace;
      font-size:.65rem; letter-spacing:3px; color:var(--text-dim);
      text-transform:uppercase; margin-bottom:18px;
      display:flex; align-items:center; gap:12px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.05); }

    /* ─── Textarea ─────────────────────────── */
    textarea {
      width:100%;
      background: rgba(0, 0, 0, 0.65);
      border:1px solid rgba(255, 255, 255, 0.12);
      border-radius:2px;
      color:#fff;
      font-family:'Rajdhani', sans-serif; font-size:1.2rem; font-weight:500;
      line-height:1.6; padding:18px;
      resize:vertical; min-height:100px; outline:none;
      transition: all 0.2s;
    }
    textarea::placeholder { color:rgba(255,255,255,0.2); }
    textarea:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 15px rgba(211, 47, 47, 0.1);
    }

    .btn-row { display:flex; justify-content:flex-end; margin-top:14px; }

    .btn-analyze {
      background: linear-gradient(to right, #b71c1c, #e53935);
      border: 1px solid #ff5252;
      color: #fff;
      font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 700;
      padding: 12px 35px; text-transform: uppercase; cursor: pointer;
      border-radius: 4px; letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(211, 47, 47, 0.4);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(255, 82, 82, 0.6);
      filter: brightness(1.1);
    }

    .attach-group { display: flex; gap: 12px; }

    .btn-attach {
      background: rgba(35, 40, 50, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: #9ea4b0;
      font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
      padding: 10px 20px; text-transform: uppercase; cursor: pointer;
      border-radius: 4px; display: flex; align-items: center; gap: 10px;
      transition: all 0.2s;
    }
    .btn-attach:hover { 
      background: rgba(50, 60, 80, 1); 
      color: #fff; 
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.1);
    }

    /* ── Image Preview ── */
    #preview-container {
      display: none;
      position: relative;
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      max-height: 180px;
      background: #000;
    }

    #preview-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.8;
    }

    .btn-remove-img {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(204, 26, 26, 0.8);
      color: #fff;
      border: none;
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .btn-remove-img:hover { background: var(--accent-hi); }

    .input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }

    .attach-group {
      display: flex;
      gap: 12px;
    }

    .btn-attach {
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      padding: 8px 16px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-attach:hover {
      border-color: var(--text);
      color: var(--text);
    }
    .btn-analyze:disabled { opacity:.4; cursor:not-allowed; }

    /* ─── Loading ────────────────────────────── */
    #loading {
      display:none; flex-direction:column;
      align-items:center; gap:14px; padding:24px 0;
    }
    .spinner {
      width:58px; height:58px; border-radius:50%;
      border:3px solid rgba(204,26,26,.15);
      border-top:3px solid var(--accent-hi);
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text {
      font-family:'Share Tech Mono', monospace;
      font-size:.72rem; letter-spacing:3px; color:var(--accent-hi);
      animation:blink .9s step-end infinite;
    }

    /* ─── Result ─────────────────────────────── */
    #result { display:none; }

    .verdict-banner {
      display:flex; align-items:center; gap:20px;
      padding:18px 22px; border-radius:2px; margin-bottom:22px;
      border-left:4px solid;
    }
    .verdict-banner.FALSE      { border-color:var(--accent-hi); background:rgba(204,26,26,.1); }
    .verdict-banner.TRUE       { border-color:var(--confirmed);  background:rgba(76,175,80,.08); }
    .verdict-banner.MISLEADING { border-color:var(--amber);      background:rgba(230,160,0,.08); }
    .verdict-banner.UNVERIFIED { border-color:var(--blue);       background:rgba(58,184,216,.08); }

    .verdict-emoji { font-size:2rem; line-height:1; }

    .verdict-label {
      font-family:'Orbitron', monospace;
      font-size:1.9rem; font-weight:900; letter-spacing:5px;
    }
    .FALSE      .verdict-label { color:var(--accent-hi); text-shadow:0 0 10px rgba(255,51,51,.4); }
    .TRUE       .verdict-label { color:var(--confirmed);  text-shadow:0 0 10px rgba(76,175,80,.4); }
    .MISLEADING .verdict-label { color:var(--amber);      text-shadow:0 0 10px rgba(230,160,0,.4); }
    .UNVERIFIED .verdict-label { color:var(--blue);       text-shadow:0 0 10px rgba(58,184,216,.4); }

    .verdict-sub {
      font-family:'Share Tech Mono', monospace;
      font-size:.7rem; color:var(--text-dim); margin-top:4px;
    }

    /* Intel blocks */
    .intel-block { margin-bottom:18px; }
    .intel-block label {
      display:block;
      font-family:'Share Tech Mono', monospace;
      font-size:.65rem; letter-spacing:3px; color:var(--text-dim);
      text-transform:uppercase; margin-bottom:10px;
    }
    .intel-block p { 
      font-size:1.15rem; font-weight:500; line-height:1.7; 
      color:rgba(255,255,255,0.95);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .sources-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
    .sources-list li a {
      font-family:'Share Tech Mono', monospace; font-size:.78rem;
      color:var(--accent-hi); text-decoration:none;
      display:flex; align-items:flex-start; gap:10px;
      transition:color .2s;
      word-break:break-all;
      margin-bottom: 2px;
    }
    .sources-list li a::before { content:'▶'; color:var(--text); flex-shrink:0; font-size:.55rem; margin-top:4px; }
    .sources-list li a:hover { color:#fff; text-shadow: 0 0 8px var(--accent-hi); }

    /* Meta */
    .meta-bar {
      display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
      padding-top:16px; border-top:1px solid var(--border);
      margin-top:10px;
      font-family:'Share Tech Mono', monospace; font-size:.63rem; color:var(--text-dim);
    }
    .cache-badge {
      padding:3px 12px; border-radius:2px; letter-spacing:1.5px;
      font-size:.6rem; text-transform:uppercase;
    }
    .cache-badge.hit  { background:rgba(58,184,216,.1); color:var(--blue);  border:1px solid rgba(58,184,216,.3); }
    .cache-badge.miss { background:rgba(204,26,26,.1);   color:var(--text-dim); border:1px solid var(--border); }

    /* Error */
    #error-msg {
      display:none; margin-top:12px;
      font-family:'Share Tech Mono', monospace; font-size:.75rem;
      color:var(--accent-hi); padding:11px 15px;
      border:1px solid rgba(204,26,26,.3); border-radius:2px;
      background:rgba(204,26,26,.07);
    }

    footer {
      text-align:center; margin-top:44px;
      font-family:'Share Tech Mono', monospace; font-size:.58rem;
      letter-spacing:2px; color:var(--text-dim); text-transform:uppercase;
    }

    @media(max-width:600px){
      h1{font-size:1.8rem; letter-spacing:3px;}
      .panel{padding:20px 16px;}
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-row">
      <div class="skull-icon">☠</div>
      <h1>WarWatch</h1>
    </div>
    <p class="tagline">OSINT · Real-Time War Misinformation Intelligence</p>
    <div class="status-row">
      <div class="status-item"><span class="status-dot"></span> SYSTEM ONLINE</div>
      <div class="status-item"><span class="status-dot" style="animation-delay:0.7s"></span> LIVE INTEL ACTIVE</div>
    </div>
  </header>

  <!-- Input -->
  <div class="panel">
    <div class="section-label">Submit Intelligence Claim</div>
    <div class="input-group">
      <textarea
        id="claim-input"
        rows="3"
        placeholder="Enter a war-related claim or upload an image…"
      ></textarea>
      
      <!-- Image Preview -->
      <div id="preview-container">
        <img id="preview-img" src="" alt="Preview">
        <button class="btn-remove-img" onclick="removeImage()">×</button>
      </div>

      <div id="error-msg"></div>

      <div class="input-actions">
        <div class="attach-group">
          <input type="file" id="image-upload" accept="image/*" style="display:none" onchange="handleImage(this)">
          <button class="btn-attach" onclick="document.getElementById('image-upload').click()">
            📎 Attach Image
          </button>
        </div>
        <button class="btn-analyze" id="analyze-btn" onclick="analyze()">
          ⬡ Analyze Claim
        </button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="panel" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">SCANNING INTEL SOURCES…</div>
  </div>

  <!-- Result -->
  <div class="panel" id="result">
    <div class="section-label">Intelligence Report</div>

    <div id="verdict-banner" class="verdict-banner">
      <div class="verdict-emoji" id="verdict-emoji"></div>
      <div>
        <div class="verdict-label" id="verdict-label"></div>
        <div class="verdict-sub" id="verdict-sub"></div>
      </div>
    </div>

    <div class="intel-block">
      <label>Analysis</label>
      <p id="explanation-text"></p>
    </div>

    <div class="intel-block" id="sources-block">
      <label>Intelligence Sources</label>
      <ul class="sources-list" id="sources-list"></ul>
    </div>

    <div class="meta-bar">
      <span id="latency-text"></span>
      <span id="cache-badge" class="cache-badge"></span>
    </div>
  </div>

  <footer>WarWatch v1.0 · OSINT Misinformation Intelligence Platform · Verdicts are AI-generated, verify independently</footer>
</div>

<script>
  const ICONS  = { FALSE:'☠', TRUE:'✅', MISLEADING:'⚠️', UNVERIFIED:'❓' };
  const LABELS = { FALSE:'DISINFORMATION', TRUE:'CONFIRMED', MISLEADING:'MISLEADING', UNVERIFIED:'UNVERIFIED' };

  async function analyze() {
    const claim = document.getElementById('claim-input').value.trim();
    if (!claim || claim.length < 5) { showError('⚠ Enter a valid claim (min 5 chars).'); return; }

    clearError();
    setLoading(true);

    try {
      const res  = await fetch('/verify', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ claim })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Server error'); }
      showResult(await res.json());
    } catch(e) {
      showError('⚠ ' + (e.message || 'Connection failed.'));
    } finally {
      setLoading(false);
    }
  }

  async function handleImage(input) {
    if (!input.files || !input.files[0]) return;

    const file = input.files[0];
    
    // Show preview
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('preview-container').style.display = 'block';
    };
    reader.readAsDataURL(file);

    clearError();
    setLoading(true, "EXTRACTING INTEL FROM IMAGE…");

    try {
      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch('/analyze-image', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Vision analysis failed');
      }

      const data = await res.json();
      if (data.claim) {
        document.getElementById('claim-input').value = data.claim;
        // Auto-trigger verification after extraction
        analyze();
      }
    } catch (e) {
      showError('⚠ ' + e.message);
      removeImage();
    } finally {
      setLoading(false);
    }
  }

  function removeImage() {
    document.getElementById('image-upload').value = '';
    document.getElementById('preview-container').style.display = 'none';
    document.getElementById('preview-img').src = '';
  }

  function showResult(data) {
    const v = (data.verdict || 'UNVERIFIED').toUpperCase();
    const banner = document.getElementById('verdict-banner');
    banner.className = 'verdict-banner ' + v;
    document.getElementById('verdict-emoji').textContent = ICONS[v] || '❓';
    document.getElementById('verdict-label').textContent = LABELS[v] || v;
    document.getElementById('verdict-sub').textContent   = 'Confidence: ' + data.confidence_score;
    document.getElementById('explanation-text').textContent = data.explanation;

    const list = document.getElementById('sources-list');
    list.innerHTML = '';
    if (data.top_sources && data.top_sources.length) {
      data.top_sources.forEach(url => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${url}" target="_blank" rel="noopener">${url}</a>`;
        list.appendChild(li);
      });
      document.getElementById('sources-block').style.display = 'block';
    } else {
      document.getElementById('sources-block').style.display = 'none';
    }

    document.getElementById('latency-text').textContent = `⏱ ${data.latency_ms}ms`;
    const badge = document.getElementById('cache-badge');
    badge.textContent  = data.cached ? '⚡ CACHE HIT' : '🔍 LIVE SCAN';
    badge.className    = 'cache-badge ' + (data.cached ? 'hit' : 'miss');

    document.getElementById('result').style.display = 'block';
  }

  function setLoading(on, text = "SCANNING INTEL SOURCES…") {
    document.getElementById('loading').style.display = on ? 'flex' : 'none';
    document.querySelector('#loading .loading-text').textContent = text;
    if (on) document.getElementById('result').style.display = 'none';
    document.getElementById('analyze-btn').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
  }
  function clearError() { document.getElementById('error-msg').style.display = 'none'; }

  document.getElementById('claim-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) analyze();
  });
</script>
</body>
</html>
